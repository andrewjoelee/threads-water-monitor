name: Threads Followers Monitor

on:
  schedule:
    # 這裡的設定代表每 3 小時自動執行一次 (國際標準時間 UTC)
    - cron: '0 */3 * * *'
  workflow_dispatch: # 這一行能讓我們隨時在網頁上手動點擊按鈕來測試執行

jobs:
  run-crawler:
    runs-on: ubuntu-latest

    steps:
    - name: 檢查專案程式碼
      uses: actions/checkout@v3

    - name: 設定 Python 環境
      uses: actions/setup-python@v4
      with:
        python-version: '3.10'

    - name: 安裝必要外掛套件
      run: |
        python -m pip install --upgrade pip
        pip install playwright
        
    - name: 初始化 Playwright 瀏覽器環境
      run: |
        playwright install chromium

    - name: 啟動爬蟲並同步更新至 Google 試算表
      run: python fetch_to_sheets.py
